services:
  web:
    command: >
      sh -c "python manage.py migrate --noinput &&
             exec python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - /app/.venv
      - ./.bge_cache:/app/.cache/bge
    environment:
      DJANGO_DEBUG: "True"
    restart: "no"

  postgres:
    restart: "no"

  redis:
    restart: "no"

  worker:
    volumes:
      - .:/app
      - /app/.venv
    restart: "no"
