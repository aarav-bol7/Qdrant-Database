services:

  postgres:
    image: postgres:16-alpine
    container_name: qdrant_rag_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [qdrant_rag_net]

  redis:
    image: redis:7-alpine
    container_name: qdrant_rag_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [qdrant_rag_net]

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant_rag_qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [qdrant_rag_net]

  web:
    build: .
    container_name: qdrant_rag_web
    command:
      - sh
      - -c
      - >-
          python manage.py migrate --noinput &&
          python manage.py collectstatic --noinput &&
          exec gunicorn config.wsgi:application
          --bind 0.0.0.0:8000
          --workers 2
          --timeout 90
          --access-logfile -
          --error-logfile -
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
      qdrant:   {condition: service_healthy}
    ports:
      - "${HTTP_PORT:-8000}:8000"
    volumes:
      - ./.bge_cache:/app/.cache/bge
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks: [qdrant_rag_net]

  grpc:
    build: .
    container_name: qdrant_rag_grpc
    command:
      - sh
      - -c
      - >-
          python -m apps.grpc_service.server
    env_file: .env
    depends_on:
      web: {condition: service_healthy}
    ports:
      - "${GRPC_PORT:-50051}:50051"
    volumes:
      - ./.bge_cache:/app/.cache/bge
    restart: unless-stopped
    stop_grace_period: 30s
    networks: [qdrant_rag_net]

  worker:
    build: .
    container_name: qdrant_rag_worker
    command: celery -A config worker -l INFO --concurrency=2
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    restart: unless-stopped
    networks: [qdrant_rag_net]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  qdrant_rag_net:
    driver: bridge
